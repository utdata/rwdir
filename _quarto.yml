project:
  type: book
  resources:
    - v*/
book:
  title: "Reporting with Data in R"
  author: "Christian McDonald"
  date: last-modified
  repo-url: https://github.com/utdata/rwdir
  repo-actions: [source, issue]
  chapters:
    - index.qmd
    - install.qmd
    - intro.qmd
    - part: "Counting"
      chapters: 
      - billboard-cleaning.qmd
      - billboard-analysis.qmd
    - part: "Summing"
      chapters:
      - leso-cleaning.qmd
      - leso-analysis.qmd
    - part: "Visualization"
      chapters:
      - plots.qmd
      - plots-more.qmd
      - tidy-data.qmd
    - part: "Bind & Join"    
      chapters:
      - denied-cleaning.qmd
      - denied-analysis.qmd
    - part: "Extras"    
      chapters:
      - functions.qmd
      - group-dates.qmd
      - count.qmd
      - categorization.qmd
      - tidycensus.qmd
      - git.qmd
  appendices:
    - project-setup.qmd
    - posit-cloud.qmd
    - troubleshooting.qmd
    - getting-help.qmd
    - explore.qmd
    - charts-tips.qmd
    - resources.qmd

format:
  html:
    theme: cosmo
    df-print: paged
    code-overflow: wrap
    css: styles.css

editor: source
